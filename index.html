<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS IPA Preparation Quiz</title>
    <meta name="description" content="Practice MCQ questions for the TCS IPA assessment with instant feedback and hints.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>TCS IPA Practice</h1>
            </div>
            <div class="progress-container">
                <span id="question-progress">Question 1 of 347</span>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <main class="quiz-container">
            <div id="quiz-content" class="quiz-content">
                <div class="question-header">
                    <h2 id="question-text">Loading question...</h2>
                </div>
                
                <div id="options-container" class="options-container">
                    <!-- Options will be injected here -->
                </div>

                <div id="feedback-container" class="feedback-container hidden">
                    <div id="feedback-status" class="feedback-status"></div>
                    <div class="hint-box">
                        <h3><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg> Explanation</h3>
                        <p id="hint-text"></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <button id="btn-prev" class="btn btn-secondary" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                Previous
            </button>
            <button id="btn-next" class="btn btn-primary">
                Next
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </footer>
    </div>

    <!-- Load the questions data -->
    <script src="questions.js"></script>
    <!-- Load the application logic -->
    <script src="app.js"></script>
</body>
</html>
